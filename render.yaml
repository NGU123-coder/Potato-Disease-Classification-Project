services:
  - type: web
    name: potato-disease-api
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        sync: false # Set this to your Vercel URL
      - key: PYTHON_VERSION
        value: 3.11.9
