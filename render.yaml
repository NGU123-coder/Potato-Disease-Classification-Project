services:
  - type: web
    name: potato-disease-api
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker api.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
